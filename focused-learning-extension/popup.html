<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZoneIn Focus Mode</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── AUTH SCREEN (shown when logged out) ─────────────────────────────── -->
  <div id="authScreen" class="screen hidden">
    <div class="container">
      <header>
        <h1>ZoneIn</h1>
        <span class="tagline">Focused Learning</span>
      </header>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" />
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
        <button id="loginBtn" class="btn-primary">Login</button>
        <p id="loginError" class="error-msg hidden"></p>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="auth-form hidden">
        <input type="text" id="regName" placeholder="Your Name" />
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email" />
        <input type="password" id="regPassword" placeholder="Password (min 6 chars)" autocomplete="new-password" />
        <button id="registerBtn" class="btn-primary">Create Account</button>
        <p id="registerError" class="error-msg hidden"></p>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP SCREEN (shown when logged in) ──────────────────────────── -->
  <div id="appScreen" class="screen hidden">
    <div class="container compact">

      <!-- Header -->
      <header>
        <h1>ZoneIn</h1>
        <label class="switch" title="Toggle Focus Mode">
          <input type="checkbox" id="focusToggle">
          <span class="slider round"></span>
        </label>
      </header>

      <main>
        <div class="stat-card">
          <span class="label">⏱ Watch Time</span>
          <span class="value" id="watchTime">0m</span>
        </div>
        <div class="stat-card">
          <span class="label">🚫 Distractions Blocked</span>
          <span class="value" id="blockedCount">0</span>
        </div>
      </main>

      <footer>
        <button id="dashboardBtn">Open Dashboard ↗</button>
        <div id="focusWarning" class="focus-warning hidden">⚠ Focus Mode is OFF</div>
        <button id="logoutBtn" class="btn-ghost">Logout</button>
      </footer>

    </div>
  </div>

  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
